# Deploy Kargo resources after CRDs are installed

# Wait for Helm chart to install CRDs first
dependsOn:
- name: local-manifests-local-gitrepos-kargo-helm

targetCustomizations:
- name: local-only
  clusterSelector:
    matchLabels:
      cluster-type: local

# Ignore auto-generated fields
diff:
  comparePatches:
  - apiVersion: v1
    kind: Secret
    operations:
    - {"op": "remove", "path": "/data"}
  - apiVersion: v1
    kind: ServiceAccount
    operations:
    - {"op": "remove", "path": "/secrets"}
    - {"op": "remove", "path": "/imagePullSecrets"}
