apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kargo-controller-secrets
  namespace: hello-kargo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  # This ClusterRole is provided by Kargo installation
  name: kargo-project-secrets-reader
subjects:
- kind: ServiceAccount
  name: kargo-controller
  namespace: kargo
