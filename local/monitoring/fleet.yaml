# Fleet bundle configuration for LOCAL/Management cluster
defaultNamespace: cattle-monitoring-system

# Target LOCAL cluster only
targetCustomizations:
- name: local-cluster
  clusterSelector:
    matchLabels:
      cluster-type: local

