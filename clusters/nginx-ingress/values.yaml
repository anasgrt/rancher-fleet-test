controller:
  replicaCount: 2
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  
  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443
  
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false
  
  admissionWebhooks:
    enabled: true
    
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    fsGroup: 101
