defaultNamespace: ingress-nginx

helm:
  chart: ingress-nginx
  repo: https://kubernetes.github.io/ingress-nginx
  version: 4.11.3
  releaseName: nginx-ingress
  wait: false 
  timeoutSeconds: 600
  valuesFiles:
  - values.yaml

# Ignore LoadBalancer external IP status
diff:
  comparePatches:
  - apiVersion: v1
    kind: Service
    name: nginx-ingress-ingress-nginx-controller
    namespace: ingress-nginx
    operations:
    - {"op": "remove", "path": "/status"}

targetCustomizations:
- name: dev-clusters
  clusterSelector:
    matchLabels:
      env: dev
