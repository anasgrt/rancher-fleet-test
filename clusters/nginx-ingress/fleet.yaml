defaultNamespace: ingress-nginx

# Target clusters with env=dev label
targetCustomizations:
- name: dev-clusters
  clusterSelector:
    matchLabels:
      env: dev

helm:
  # Reference to Helm chart repository
  chart: ingress-nginx
  repo: https://kubernetes.github.io/ingress-nginx
  version: 4.11.3  # Specify version or use "latest"
  
  # Helm release name
  releaseName: nginx-ingress
  
  # Wait for resources to be ready
  timeoutSeconds: 300
  
  # Additional Helm flags
  atomic: true
  disablePreProcess: false
