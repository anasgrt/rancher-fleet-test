defaultNamespace: ingress-nginx

helm:
  # External Helm chart reference
  chart: ingress-nginx
  repo: https://kubernetes.github.io/ingress-nginx
  version: 4.11.3
  releaseName: nginx-ingress
  
  timeoutSeconds: 600 
  
  
  # Helm values override (optional)
  valuesFiles:
  - values.yaml

# Target clusters
targetCustomizations:
- name: dev-clusters
  clusterSelector:
    matchLabels:
      env: dev
