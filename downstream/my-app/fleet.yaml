# Fleet Configuration for my-app
# Environment-specific deployments

targetCustomizations:
- name: dev-environment
  clusterSelector:
    matchLabels:
      env: dev
  helm:
    values:
      replicaCount: 1
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"

- name: prd-environment
  clusterSelector:
    matchLabels:
      env: prd
  helm:
    values:
      replicaCount: 3
      resources:
        requests:
          memory: "256Mi"
          cpu: "200m"
