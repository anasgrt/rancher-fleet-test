# Fleet v0.13.4 Configuration for debug-tools
#
# IMPORTANT: This app is deployed ONLY to dev clusters
# 
# In Fleet v0.13.4, targeting is controlled by cluster labels, NOT by fleet.yaml.
# Since multiple ClusterGroups exist (default=env:dev, production=env:prd),
# Fleet will deploy this to clusters matching the FIRST ClusterGroup alphabetically.
#
# To ensure this ONLY goes to dev clusters:
# - Clusters with env=dev label will receive this deployment
# - The 'default' ClusterGroup (env=dev) takes precedence
#
# See: README.md for complete Fleet v0.13.4 documentation

defaultNamespace: debug-tools
keepResources: false

# Simple debug deployment
---
apiVersion: v1
kind: Namespace
metadata:
  name: debug-tools
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug-pod
  namespace: debug-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debug
  template:
    metadata:
      labels:
        app: debug
    spec:
      containers:
      - name: debug
        image: nicolaka/netshoot:latest
        command: ["sleep", "infinity"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
