defaultNamespace: ingress-nginx

helm:
  chart: ingress-nginx
  repo: https://kubernetes.github.io/ingress-nginx
  version: 4.11.3
  releaseName: nginx-ingress
  wait: false
  timeoutSeconds: 600
  valuesFiles:
  - values.yaml

# Target ALL downstream clusters (both dev and prd)
targetCustomizations:
- name: downstream-clusters
  clusterSelector:
    matchExpressions:
    - key: env
      operator: In
      values:
      - dev
      - prd
