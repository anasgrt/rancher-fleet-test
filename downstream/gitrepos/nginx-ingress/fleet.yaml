defaultNamespace: ingress-nginx

# Clean up resources when bundle removed
keepResources: false

helm:
  chart: ingress-nginx
  repo: https://kubernetes.github.io/ingress-nginx
  version: 4.11.3
  releaseName: nginx-ingress
  wait: false
  timeoutSeconds: 600
  valuesFiles:
  - values.yaml

# Target only dev cluster using Fleet v0.13 'targets' syntax
targets:
- name: dev-only
  clusterSelector:
    matchLabels:
      env: dev
