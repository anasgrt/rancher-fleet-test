# Fleet Configuration for nginx-ingress Controller
# Targets: DOWNSTREAM CLUSTERS ONLY
# Purpose: Provides ingress capability for workload clusters

defaultNamespace: ingress-nginx

helm:
  # External Helm chart reference
  chart: ingress-nginx
  repo: https://kubernetes.github.io/ingress-nginx
  version: 4.11.3
  releaseName: nginx-ingress
  
  # Helm release behavior - OPTIMIZED FOR VAGRANT/BARE-METAL
  wait: false               # Don't wait for LoadBalancer (speeds up deployment)
  timeoutSeconds: 600       # Extended timeout for initial deployment
  
  # Values override file
  valuesFiles:
  - values.yaml

# CRITICAL: Target DOWNSTREAM clusters ONLY
# The management cluster (local) should NOT run this ingress controller
# as it may conflict with Rancher's built-in ingress
targetCustomizations:
- name: downstream-clusters
  clusterSelector:
    matchLabels:
      cluster-type: downstream
