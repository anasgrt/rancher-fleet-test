# Fleet v0.13.4 Configuration for nginx-ingress
#
# IMPORTANT RULES:
# 1. DO NOT add namespace.yaml or any other raw manifests to this directory
#    (Helm charts cannot be mixed with raw manifests in Fleet v0.13.4)
# 2. DO NOT add 'targets' or 'targetCustomizations' fields
#    (Targeting is controlled by ClusterGroup resources)
# 3. Use 'defaultNamespace' instead of creating namespace.yaml
#
# Targeting: Deployed to ALL downstream clusters via ClusterGroup 'default'
# Note: In Fleet v0.13.4, all apps deploy to first alphabetical ClusterGroup
# See: README.md for complete documentation

defaultNamespace: ingress-nginx

# Clean up resources when bundle removed
keepResources: false

helm:
  chart: ingress-nginx
  repo: https://kubernetes.github.io/ingress-nginx
  version: 4.11.3
  releaseName: nginx-ingress
  wait: false
  timeoutSeconds: 600
  valuesFiles:
  - values.yaml
